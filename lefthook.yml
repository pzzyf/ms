pre-commit:
  parallel: false
  commands:
    format:
      priority: 1
      glob: '*.{js,cjs,mjs,ts,cts,mts,jsx,tsx,vue,json,json5,jsonc,yml,yaml,css,scss,less,html,md,mdx}'
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true
    lint:
      priority: 2
      glob: '*.{js,cjs,mjs,ts,cts,mts,jsx,tsx,vue,json,json5,jsonc,yml,yaml}'
      run: pnpm exec eslint --fix --no-warn-ignored {staged_files}
      stage_fixed: true
    checkType:
      priority: 3
      run: pnpm check:type

post-merge:
  commands:
    install:
      run: pnpm install

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit $1
